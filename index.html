<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTÜ UTAT | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none; }
        .kurumsal-mavi { background-color: #003057; } /* BTÜ Laciverti */
        .kanban-column { background-color: #f1f5f9; min-height: 600px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .task-card { background: white; transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .task-card:hover { transform: translateY(-3px); shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .xp-bar-bg { background-color: #e2e8f0; border-radius: 999px; }
        .xp-bar-fill { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); background: linear-gradient(90deg, #003057, #00569d); }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen px-4 bg-slate-100">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">BTÜ UTAT</h2>
                <p class="text-slate-500 text-sm mt-2">Uluslararası Ticaret Araştırmaları Topluluğu</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Kurumsal E-posta" class="w-full p-3 bg-slate-50 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-900 transition text-slate-900">
                <input type="password" id="password" placeholder="Şifre" class="w-full p-3 bg-slate-50 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-900 transition text-slate-900">
                <button id="loginBtn" class="w-full kurumsal-mavi text-white py-3 rounded-lg font-bold shadow-lg hover:opacity-90 transition uppercase tracking-wider">Sisteme Giriş Yap</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">UTAT <span class="text-blue-800 italic">PANEL</span></h1>
                    <div class="xp-bar-bg w-48 h-1.5 mt-1">
                        <div id="xp-bar" class="xp-bar-fill h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest hidden md:block">Yönetici Oturumu</span>
                <button id="logoutBtn" class="text-xs border border-slate-300 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 transition font-bold">ÇIKIŞ YAP</button>
            </div>
        </header>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="bg-white p-6 rounded-xl mb-10 shadow-sm border border-slate-200">
                <h3 class="text-slate-900 font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-6 kurumsal-mavi rounded-full"></span>
                    Yeni Operasyonel Görev Atama
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="taskName" placeholder="Görev başlığı..." class="bg-slate-50 p-3 rounded-lg border border-slate-200 outline-none focus:border-blue-800 transition">
                    <select id="deptHead" class="bg-slate-50 p-3 rounded-lg border border-slate-200 outline-none">
                        <option>Dış İlişkiler Birimi</option>
                        <option>Medya & Tanıtım Birimi</option>
                        <option>Organizasyon Birimi</option>
                        <option>Ar-Ge & Proje Birimi</option>
                    </select>
                    <input type="date" id="deadline" class="bg-slate-50 p-3 rounded-lg border border-slate-200 outline-none">
                    <button id="addTaskBtn" class="kurumsal-mavi text-white font-bold rounded-lg hover:bg-blue-900 transition shadow-md">GÖREVİ YAYINLA</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="kanban-column p-5">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-slate-500 font-bold text-xs uppercase tracking-widest">Açık Görevler</h3>
                        <span id="todo-count" class="bg-slate-200 text-slate-700 text-[10px] font-bold px-2 py-1 rounded-full">0</span>
                    </div>
                    <div id="todo-container" class="space-y-4"></div>
                </div>

                <div class="kanban-column p-5 border-blue-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-blue-800 font-bold text-xs uppercase tracking-widest">İşlemdekiler</h3>
                        <span id="doing-count" class="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-1 rounded-full">0</span>
                    </div>
                    <div id="doing-container" class="space-y-4"></div>
                </div>

                <div class="kanban-column p-5 border-emerald-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-emerald-700 font-bold text-xs uppercase tracking-widest">Tamamlananlar</h3>
                        <span id="done-count" class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded-full">0</span>
                    </div>
                    <div id="done-container" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaSheVnODQoZERnc1T6I-IfPM1xbtPVYQ",
          authDomain: "utat-admin-panel.firebaseapp.com",
          projectId: "utat-admin-panel",
          storageBucket: "utat-admin-panel.firebasestorage.app",
          messagingSenderId: "512936046400",
          appId: "1:512936046400:web:1f00a0498f3a677cb954a5",
          measurementId: "G-PFCFP0J24H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Giriş bilgileri hatalı!"));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        document.getElementById('addTaskBtn').onclick = async () => {
            const title = document.getElementById('taskName').value;
            const assignedTo = document.getElementById('deptHead').value;
            const deadline = document.getElementById('deadline').value;
            if(title) {
                await addDoc(collection(db, "tasks"), {
                    title, assignedTo, deadline: deadline || "Süresiz",
                    status: "todo", createdAt: new Date()
                });
                document.getElementById('taskName').value = "";
            }
        };

        window.updateStatus = async (id, newStatus) => {
            await updateDoc(doc(db, "tasks", id), { status: newStatus });
        };

        window.deleteTask = async (id) => {
            if(confirm("Bu görevi arşive taşımak istediğinize emin misiniz?")) {
                await deleteDoc(doc(db, "tasks", id));
            }
        };

        function syncData() {
            onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snapshot) => {
                const sections = { todo: "", doing: "", done: "" };
                const counts = { todo: 0, doing: 0, done: 0 };

                snapshot.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    counts[data.status]++;

                    let actionBtn = "";
                    if(data.status === "todo") actionBtn = `<button onclick="updateStatus('${id}', 'doing')" class="bg-blue-50 text-blue-800 text-[10px] px-3 py-1.5 rounded-lg font-bold border border-blue-100 hover:bg-blue-800 hover:text-white transition">BAŞLAT</button>`;
                    else if(data.status === "doing") actionBtn = `<button onclick="updateStatus('${id}', 'done')" class="bg-emerald-50 text-emerald-700 text-[10px] px-3 py-1.5 rounded-lg font-bold border border-emerald-100 hover:bg-emerald-700 hover:text-white transition">TAMAMLA</button>`;
                    else actionBtn = `<button onclick="deleteTask('${id}')" class="bg-slate-50 text-slate-400 text-[10px] px-3 py-1.5 rounded-lg font-bold hover:bg-red-50 hover:text-red-500 transition">ARŞİVLE</button>`;

                    sections[data.status] += `
                        <div class="task-card p-5 rounded-xl shadow-sm border-l-4 ${data.status === 'done' ? 'border-l-emerald-500' : (data.status === 'doing' ? 'border-l-blue-800' : 'border-l-slate-300')}">
                            <div class="flex justify-between items-start gap-2">
                                <p class="font-bold text-sm text-slate-800 leading-tight">${data.title}</p>
                                ${actionBtn}
                            </div>
                            <div class="flex items-center justify-between mt-4">
                                <span class="text-[10px] font-medium text-slate-500 uppercase tracking-wide">${data.assignedTo}</span>
                                <span class="text-[10px] font-bold text-slate-400 italic">${data.deadline}</span>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('todo-container').innerHTML = sections.todo;
                document.getElementById('doing-container').innerHTML = sections.doing;
                document.getElementById('done-container').innerHTML = sections.done;
                
                document.getElementById('todo-count').innerText = counts.todo;
                document.getElementById('doing-count').innerText = counts.doing;
                document.getElementById('done-count').innerText = counts.done;

                const total = counts.todo + counts.doing + counts.done;
                const xp = total > 0 ? (counts.done / total) * 100 : 0;
                document.getElementById('xp-bar').style.width = xp + "%";
            });
        }
    </script>
</body>
</html>
