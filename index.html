<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTAT Admin | S-Rank Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        body { background-color: #0b0f1a; color: white; }
        .kanban-column { background: rgba(30, 41, 59, 0.5); min-height: 500px; border-radius: 12px; border: 1px solid #1e293b; }
        .xp-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen px-4">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-indigo-500/30">
            <h2 class="text-3xl font-black mb-2 text-center text-indigo-400 italic">SYSTEM LOGIN</h2>
            <p class="text-gray-500 text-center text-xs mb-8 uppercase tracking-widest">UTAT Executive Access</p>
            <input type="email" id="email" placeholder="Admin E-posta" class="w-full p-3 mb-4 bg-slate-800 rounded-lg border border-slate-700 outline-none focus:border-indigo-500 transition text-white">
            <input type="password" id="password" placeholder="Şifre" class="w-full p-3 mb-6 bg-slate-800 rounded-lg border border-slate-700 outline-none focus:border-indigo-500 transition text-white">
            <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-black shadow-lg shadow-indigo-500/20 transition">ZİNDANA GİR</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="bg-slate-900/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-indigo-900/50 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic text-indigo-400">UTAT RESEARCH</h1>
                <div class="w-48 h-2 bg-slate-800 rounded-full mt-1 overflow-hidden">
                    <div id="xp-bar" class="xp-bar h-full bg-indigo-500" style="width: 0%"></div>
                </div>
            </div>
            <button id="logoutBtn" class="text-[10px] border border-red-500 text-red-500 px-3 py-1 rounded-md hover:bg-red-500 hover:text-white transition">OTURUMU KAPAT</button>
        </header>

        <main class="p-4 max-w-7xl mx-auto">
            <div class="bg-slate-900 p-5 rounded-xl mb-8 border border-slate-800">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="taskName" placeholder="Görev adı..." class="bg-slate-800 p-2 rounded-lg border border-slate-700 outline-none focus:border-indigo-500">
                    <select id="deptHead" class="bg-slate-800 p-2 rounded-lg border border-slate-700 outline-none">
                        <option>Dış İlişkiler</option>
                        <option>Medya & Tanıtım</option>
                        <option>Organizasyon</option>
                        <option>Ar-Ge</option>
                    </select>
                    <input type="date" id="deadline" class="bg-slate-800 p-2 rounded-lg border border-slate-700 outline-none">
                    <button id="addTaskBtn" class="bg-indigo-600 hover:bg-indigo-500 font-bold rounded-lg transition">GÖREVİ BAŞLAT ⚔️</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="kanban-column p-4">
                    <h3 class="text-gray-400 font-black text-xs uppercase mb-4 tracking-widest flex justify-between">
                        Bekleyenler <span id="todo-count" class="text-indigo-400">0</span>
                    </h3>
                    <div id="todo-container" class="space-y-3"></div>
                </div>

                <div class="kanban-column p-4 border-indigo-900/20">
                    <h3 class="text-indigo-400 font-black text-xs uppercase mb-4 tracking-widest flex justify-between">
                        Yürütülenler <span id="doing-count" class="text-indigo-400">0</span>
                    </h3>
                    <div id="doing-container" class="space-y-3"></div>
                </div>

                <div class="kanban-column p-4 border-green-900/20">
                    <h3 class="text-green-400 font-black text-xs uppercase mb-4 tracking-widest flex justify-between">
                        Tamamlanan <span id="done-count" class="text-green-400">0</span>
                    </h3>
                    <div id="done-container" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaSheVnODQoZERnc1T6I-IfPM1xbtPVYQ",
          authDomain: "utat-admin-panel.firebaseapp.com",
          projectId: "utat-admin-panel",
          storageBucket: "utat-admin-panel.firebasestorage.app",
          messagingSenderId: "512936046400",
          appId: "1:512936046400:web:1f00a0498f3a677cb954a5",
          measurementId: "G-PFCFP0J24H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Giriş başarısız!"));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        // --- GÖREV EKLE ---
        document.getElementById('addTaskBtn').onclick = async () => {
            const title = document.getElementById('taskName').value;
            const assignedTo = document.getElementById('deptHead').value;
            const deadline = document.getElementById('deadline').value;

            if(title) {
                await addDoc(collection(db, "tasks"), {
                    title, assignedTo, deadline: deadline || "Süre yok",
                    status: "todo", createdAt: new Date()
                });
                document.getElementById('taskName').value = "";
            }
        };

        // --- DURUM GÜNCELLE ---
        window.updateStatus = async (id, newStatus) => {
            await updateDoc(doc(db, "tasks", id), { status: newStatus });
        };

        // --- GÖREV SİL ---
        window.deleteTask = async (id) => {
            if(confirm("Bu görevi sistemden silmek istiyor musun?")) {
                await deleteDoc(doc(db, "tasks", id));
            }
        };

        // --- VERİ SENKRONİZASYONU ---
        function syncData() {
            onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snapshot) => {
                const sections = { todo: "", doing: "", done: "" };
                const counts = { todo: 0, doing: 0, done: 0 };

                snapshot.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    counts[data.status]++;

                    let buttons = "";
                    if(data.status === "todo") buttons = `<button onclick="updateStatus('${id}', 'doing')" class="text-[10px] bg-indigo-600 px-2 py-1 rounded">BAŞLAT</button>`;
                    else if(data.status === "doing") buttons = `<button onclick="updateStatus('${id}', 'done')" class="text-[10px] bg-green-600 px-2 py-1 rounded">TAMAMLA</button>`;
                    else buttons = `<button onclick="deleteTask('${id}')" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-red-400">ARŞİVLE</button>`;

                    sections[data.status] += `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl border-l-4 ${data.status === 'done' ? 'border-l-green-500' : 'border-l-indigo-500'}">
                            <div class="flex justify-between items-start">
                                <p class="font-bold text-sm text-indigo-100">${data.title}</p>
                                ${buttons}
                            </div>
                            <p class="text-[10px] text-gray-500 mt-2 italic">${data.assignedTo} | ⏳ ${data.deadline}</p>
                        </div>
                    `;
                });

                document.getElementById('todo-container').innerHTML = sections.todo;
                document.getElementById('doing-container').innerHTML = sections.doing;
                document.getElementById('done-container').innerHTML = sections.done;
                
                document.getElementById('todo-count').innerText = counts.todo;
                document.getElementById('doing-count').innerText = counts.doing;
                document.getElementById('done-count').innerText = counts.done;

                // XP Bar Güncelleme
                const total = counts.todo + counts.doing + counts.done;
                const xp = total > 0 ? (counts.done / total) * 100 : 0;
                document.getElementById('xp-bar').style.width = xp + "%";
            });
        }
    </script>
</body>
</html>
