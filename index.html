<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTAT Admin | Management Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        body { background-color: #0f172a; color: white; }
        .kanban-card { transition: transform 0.2s; }
        .kanban-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen px-4">
        <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-indigo-500">
            <h2 class="text-3xl font-black mb-2 text-center text-indigo-400 italic">UTAT LOGIN</h2>
            <p class="text-gray-400 text-center text-sm mb-8 italic">"S-Rank Yönetici Paneline Giriş Yap"</p>
            
            <input type="email" id="email" placeholder="E-posta" class="w-full p-3 mb-4 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-indigo-500 text-white">
            <input type="password" id="password" placeholder="Şifre" class="w-full p-3 mb-6 bg-slate-700 rounded border border-slate-600 focus:outline-none focus:border-indigo-500 text-white">
            
            <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-bold text-lg transition tracking-wide">ZİNDANA GİR</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="bg-indigo-950 p-5 flex justify-between items-center shadow-2xl border-b border-indigo-900">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-indigo-400">UTAT RESEARCH</h1>
                <p class="text-xs text-indigo-300 font-bold uppercase tracking-widest">Yönetim Paneli</p>
            </div>
            <button id="logoutBtn" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition border border-red-500/50">OTURUMU KAPAT</button>
        </header>

        <main class="p-6 max-w-6xl mx-auto">
            <div class="bg-slate-800 p-6 rounded-xl mb-10 border border-slate-700 shadow-lg">
                <h3 class="text-indigo-400 font-bold mb-4 uppercase text-sm tracking-wider">🛡️ Yeni Görev Bildirimi</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="taskName" placeholder="Görevi tanımla..." class="bg-slate-700 p-3 rounded-lg text-white border border-slate-600 focus:border-indigo-500 outline-none">
                    <select id="deptHead" class="bg-slate-700 p-3 rounded-lg text-gray-200 border border-slate-600">
                        <option>Dış İlişkiler Başkanı</option>
                        <option>Medya & Tanıtım Başkanı</option>
                        <option>Organizasyon Başkanı</option>
                        <option>Ar-Ge Başkanı</option>
                    </select>
                    <input type="date" id="deadline" class="bg-slate-700 p-3 rounded-lg text-gray-200 border border-slate-600">
                    <button id="addTaskBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-3 rounded-lg font-black transition shadow-lg shadow-indigo-500/20">GÖREVİ ATA 🔔</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-700 pb-2">
                        <h4 class="font-black text-gray-400 tracking-widest uppercase">Bekleyenler</h4>
                        <span class="bg-slate-700 text-xs px-2 py-1 rounded" id="todo-count">0</span>
                    </div>
                    <div id="taskContainer" class="space-y-4 min-h-[400px]">
                        </div>
                </div>

                <div class="opacity-40 select-none hidden lg:block">
                    <div class="border-b border-slate-700 pb-2 mb-4">
                        <h4 class="font-black text-gray-600 tracking-widest uppercase text-center">Devam Eden</h4>
                    </div>
                    <div class="border-2 border-dashed border-slate-800 rounded-xl h-64 flex items-center justify-center">
                        <p class="text-slate-700 font-bold italic">Geliştirme Aşamasında</p>
                    </div>
                </div>

                <div class="opacity-40 select-none hidden lg:block">
                    <div class="border-b border-slate-700 pb-2 mb-4">
                        <h4 class="font-black text-gray-600 tracking-widest uppercase text-center">Tamamlanan</h4>
                    </div>
                    <div class="border-2 border-dashed border-slate-800 rounded-xl h-64 flex items-center justify-center">
                        <p class="text-slate-700 font-bold italic">Geliştirme Aşamasında</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Senin Config Kodların
        const firebaseConfig = {
          apiKey: "AIzaSyAaSheVnODQoZERnc1T6I-IfPM1xbtPVYQ",
          authDomain: "utat-admin-panel.firebaseapp.com",
          projectId: "utat-admin-panel",
          storageBucket: "utat-admin-panel.firebasestorage.app",
          messagingSenderId: "512936046400",
          appId: "1:512936046400:web:1f00a0498f3a677cb954a5",
          measurementId: "G-PFCFP0J24H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH İŞLEMLERİ ---
        const login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Bilgileri eksiksiz girin!");
            
            signInWithEmailAndPassword(auth, email, pass)
                .catch(err => alert("Giriş Hatası: Şifre yanlış veya kullanıcı bulunamadı."));
        };

        const logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadTasks();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        // --- GÖREV EKLEME ---
        const addTask = async () => {
            const name = document.getElementById('taskName').value;
            const head = document.getElementById('deptHead').value;
            const date = document.getElementById('deadline').value;

            if(name) {
                try {
                    await addDoc(collection(db, "tasks"), {
                        title: name,
                        assignedTo: head,
                        deadline: date || "Belirtilmedi",
                        status: "todo",
                        createdAt: new Date()
                    });
                    document.getElementById('taskName').value = "";
                } catch (e) {
                    alert("Hata: Veritabanına yazılamadı.");
                }
            } else {
                alert("Görev adı boş olamaz!");
            }
        };

        // --- REAL-TIME VERİ TAKİBİ ---
        function loadTasks() {
            const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('taskContainer');
                document.getElementById('todo-count').innerText = snapshot.size;
                container.innerHTML = "";
                
                snapshot.forEach((doc) => {
                    const task = doc.data();
                    container.innerHTML += `
                        <div class="kanban-card bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md border-l-4 border-l-indigo-500">
                            <div class="flex justify-between items-start mb-2">
                                <p class="font-black text-indigo-300 uppercase text-sm">${task.title}</p>
                                <span class="text-[10px] bg-indigo-900/50 text-indigo-300 px-2 py-0.5 rounded italic font-bold">QUEST</span>
                            </div>
                            <div class="space-y-1">
                                <p class="text-xs text-gray-400">👤 Sorumlu: <span class="text-gray-200">${task.assignedTo}</span></p>
                                <p class="text-xs text-red-400 font-bold">⏳ Deadline: ${task.deadline}</p>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // Event Listeners
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('addTaskBtn').onclick = addTask;
    </script>
</body>
</html>
