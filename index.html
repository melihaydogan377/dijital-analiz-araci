<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTÜ UTAT | Admin Master Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }
        .kanban-column { background-color: #f1f5f9; min-height: 700px; border-radius: 32px; border: 2px dashed #cbd5e1; }
        
        /* Kart Tasarımı */
        .task-card { 
            background: white; border-radius: 24px; border: 1px solid #e2e8f0; 
            padding: 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab; position: relative;
        }

        /* Sürükleme Efektleri */
        .sortable-ghost { opacity: 0.1; background: #003057 !important; }
        .sortable-drag { opacity: 1 !important; transform: rotate(3deg) scale(1.05); shadow: 2xl; }

        /* Tamamlandı Efekti (Sadece Done sütununda tetiklenir) */
        .done-style { opacity: 0.6; background: #1e293b !important; filter: grayscale(0.8); }
        .done-style p { color: #94a3b8 !important; text-decoration: line-through; }
        .done-style .badge { background: #334155 !important; }

        .badge { background: #003057; color: white; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; display: inline-block; margin: 2px; }
        .xp-fill { transition: width 1s ease; background: linear-gradient(90deg, #003057, #3b82f6); }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen bg-slate-50">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-200">
            <h2 class="text-2xl font-black text-[#003057] text-center mb-8 uppercase tracking-widest italic">UTAT ACCESS</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-posta" class="w-full p-4 rounded-2xl border outline-none focus:ring-2 focus:ring-[#003057]">
                <input type="password" id="password" placeholder="Şifre" class="w-full p-4 rounded-2xl border outline-none focus:ring-2 focus:ring-[#003057]">
                <button id="loginBtn" class="w-full bg-[#003057] text-white py-4 rounded-2xl font-bold active:scale-95 transition uppercase text-xs">Giriş Yap</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 p-4 border-b border-slate-200 flex justify-between items-center px-6 lg:px-12">
            <div>
                <h1 class="text-lg font-black text-[#003057]">BTÜ UTAT <span class="text-slate-400 font-medium italic">| Admin Panel</span></h1>
                <div class="w-48 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden"><div id="xp-bar" class="xp-fill h-full" style="width: 0%"></div></div>
            </div>
            <div class="flex gap-3">
                <button id="guideBtn" onclick="alert('NASIL KULLANILIR?\n1. Kartları sürükleyerek sütunlar arası taşıyın.\n2. Admin iseniz kartların sağ üstündeki X butonuyla silebilirsiniz.\n3. Yeşil butonla WhatsApp bildirimi atabilirsiniz.')" class="bg-blue-50 text-blue-600 font-bold px-4 py-2 rounded-xl text-[10px]">REHBER</button>
                <button id="logoutBtn" class="bg-red-50 text-red-500 font-bold px-4 py-2 rounded-xl text-[10px]">ÇIKIŞ</button>
            </div>
        </header>

        <main class="p-6 lg:p-12 max-w-[1600px] mx-auto">
            <div id="admin-form" class="bg-white p-8 rounded-[2.5rem] mb-12 shadow-sm border border-slate-200 hidden">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <input type="text" id="taskName" placeholder="Görev Başlığı" class="bg-slate-50 p-4 rounded-2xl border outline-none text-sm">
                    <select id="responsibleMembers" multiple class="bg-slate-50 p-3 rounded-2xl border outline-none text-xs font-bold h-24">
                        <option value="Melih AYDOĞAN">Melih AYDOĞAN</option>
                        <option value="Yunus Emre KATAR">Yunus Emre KATAR</option>
                        <option value="Ferhat ÖMEROĞLU">Ferhat ÖMEROĞLU</option>
                        <option value="Helen YILMAZ">Helen YILMAZ</option>
                        <option value="Betül AKTEPE">Betül AKTEPE</option>
                        </select>
                    <input type="date" id="deadline" class="bg-slate-50 p-4 rounded-2xl border outline-none text-sm">
                    <button id="addTaskBtn" class="bg-[#003057] text-white p-4 rounded-2xl font-black uppercase text-xs shadow-lg">Görevi Tanımla 🚀</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="kanban-column p-8"><h4 class="text-slate-400 font-black text-[11px] mb-8 tracking-[0.3em]">BEKLEYENLER</h4><div id="todo" class="space-y-6 min-h-[500px]"></div></div>
                <div class="kanban-column p-8"><h4 class="text-blue-500 font-black text-[11px] mb-8 tracking-[0.3em]">İŞLEMDE</h4><div id="doing" class="space-y-6 min-h-[500px]"></div></div>
                <div class="kanban-column p-8"><h4 class="text-emerald-500 font-black text-[11px] mb-8 tracking-[0.3em]">TAMAMLANDI</h4><div id="done" class="space-y-6 min-h-[500px]"></div></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaSheVnODQoZERnc1T6I-IfPM1xbtPVYQ",
          authDomain: "utat-admin-panel.firebaseapp.com",
          projectId: "utat-admin-panel",
          storageBucket: "utat-admin-panel.firebasestorage.app",
          messagingSenderId: "512936046400",
          appId: "1:512936046400:web:1f00a0498f3a677cb954a5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserEmail = "";
        const ADMIN_EMAIL = "melihaydogan@hotmail.com"; // Admin mailini buraya tam yaz!

        // AUTH
        onAuthStateChanged(auth, user => {
            if(user) {
                currentUserEmail = user.email;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-form').classList.remove('hidden');
                initKanban();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // GÖREV SİL (SADECE ADMIN)
        window.deleteTask = async (id) => {
            if(currentUserEmail !== ADMIN_EMAIL) return alert("Buna yetkiniz yok!");
            if(confirm("Görev silinsin mi?")) await deleteDoc(doc(db, "tasks", id));
        };

        // GÖREV EKLE
        document.getElementById('addTaskBtn').onclick = async () => {
            const title = document.getElementById('taskName').value;
            const deadline = document.getElementById('deadline').value;
            const members = Array.from(document.getElementById('responsibleMembers').selectedOptions).map(o => o.value);
            if(title && members.length > 0) {
                await addDoc(collection(db, "tasks"), { title, members, deadline: deadline || "Tarih Yok", status: "todo", createdAt: new Date() });
                document.getElementById('taskName').value = "";
            }
        };

        function initKanban() {
            const columns = ['todo', 'doing', 'done'];
            columns.forEach(col => {
                new Sortable(document.getElementById(col), {
                    group: 'tasks', animation: 250, fallbackOnBody: true,
                    onEnd: async (evt) => {
                        const taskId = evt.item.dataset.id;
                        await updateDoc(doc(db, "tasks", taskId), { status: evt.to.id });
                    }
                });
            });

            onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snap) => {
                const html = { todo: "", doing: "", done: "" };
                let counts = { todo: 0, doing: 0, done: 0 };

                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    const isDone = data.status === 'done';
                    counts[data.status]++;

                    // Zaman Hesapla
                    let timeStr = "Tarih Yok";
                    if(data.deadline !== "Tarih Yok") {
                        const diff = Math.ceil((new Date(data.deadline) - new Date()) / (1000*60*60*24));
                        timeStr = diff < 0 ? `Gecikti (${Math.abs(diff)} Gün)` : `Kalan: ${diff} Gün`;
                    }

                    const badges = data.members.map(m => `<span class="badge">${m}</span>`).join("");
                    const deleteBtn = (currentUserEmail === ADMIN_EMAIL) ? `<button onclick="deleteTask('${id}')" class="text-slate-300 hover:text-red-500 font-bold">✕</button>` : "";

                    html[data.status] += `
                        <div class="task-card ${isDone ? 'done-style' : 'border-l-[10px]'} ${data.status === 'doing' ? 'border-l-blue-600' : (isDone ? '' : 'border-l-slate-200')}" data-id="${id}">
                            <div class="flex justify-between items-start mb-4">
                                <p class="font-black text-[14px] text-slate-800 leading-tight">${data.title}</p>
                                ${deleteBtn}
                            </div>
                            <div class="mb-4">${badges}</div>
                            <div class="pt-3 border-t border-slate-50 flex justify-between items-center text-[10px] font-black uppercase">
                                <span class="${timeStr.includes('Gecikti') ? 'text-red-500' : 'text-slate-400'} tracking-tighter">${isDone ? 'BİTTİ' : timeStr}</span>
                                <span class="text-slate-200 italic tracking-[0.2em]">UTAT-YK</span>
                            </div>
                        </div>
                    `;
                });

                columns.forEach(c => document.getElementById(c).innerHTML = html[c]);
                document.getElementById('xp-bar').style.width = (snap.size > 0 ? (counts.done/snap.size)*100 : 0) + "%";
            });
        }
    </script>
</body>
</html>
